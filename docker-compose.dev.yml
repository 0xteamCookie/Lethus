# Local development override -- exposes infra ports to host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres etcd minio milvus -d

services:
  postgres:
    ports:
      - "5432:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus:
    ports:
      - "19530:19530"
      - "9091:9091"
